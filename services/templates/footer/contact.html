{% extends 'services/base.html' %}
{% load static %}
{% block content %}

<style>
    .contact-hero {
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                    url("{% static 'images/contact-bg.avif' %}") center/cover no-repeat;
        color: white;
        padding: 80px 0;
        border-radius: 15px;
    }

    .contact-card {
        border-radius: 15px;
        transition: 0.3s;
    }

    .contact-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .icon {
        font-size: 30px;
        color: #000;
    }

    .form-card {
        border-radius: 15px;
    }

    .submit-btn {
        background: linear-gradient(45deg, #000, #444);
        color: white;
        border: none;
    }

    .submit-btn:hover {
        background: linear-gradient(45deg, #222, #666);
    }
</style>

<div class="container mt-5">

    <!-- HERO SECTION -->
    <div class="contact-hero text-center mb-5">
        <h1 class="fw-bold"> Get in Touch</h1>
        <p class="mt-3">We’re here to help you with anything at UrbanConnect</p>
    </div>

    <!-- CONTACT INFO CARDS -->
    <div class="row text-center mb-5 g-4">

        <div class="col-md-4">
            <div class="card contact-card p-4 shadow-sm">
                <div class="icon mb-3"></div>
                <h5>Email</h5>
                <p class="text-muted">support@urbanconnect.com</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card contact-card p-4 shadow-sm">
                <div class="icon mb-3"></div>
                <h5>Phone</h5>
                <p class="text-muted">+91 9876543210</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card contact-card p-4 shadow-sm">
                <div class="icon mb-3"></div>
                <h5>Location</h5>
                <p class="text-muted">Udupi, Karnataka, India</p>
            </div>
        </div>

    </div>

    <!-- CONTACT FORM -->
    <div class="row">
        <div class="col-md-6 mb-4">
            <img src="{% static 'images/customer-side.avif' %}" class="img-fluid rounded-4 shadow">
        </div>

        <div class="col-md-6">
            <div class="card form-card shadow p-4">
                <h4 class="mb-4">Send us a Message</h4>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" class="form-control" placeholder="Your name" required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" placeholder="Your email" required>
                    </div>

                    <div class="mb-3">
                        <label>Message</label>
                        <textarea class="form-control" rows="4" placeholder="Type your message..." required></textarea>
                    </div>

                    <button type="submit" class="btn submit-btn w-100">
                        Send Message 
                    </button>
                </form>

            </div>
        </div>
    </div>

</div>

{% endblock %}
