{% extends "services/base.html" %}
{% load static %}
{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #eef2ff, #f8f9ff);
        font-family: 'Segoe UI', sans-serif;
    }

    .edit-card {
        max-width: 520px;
        margin: auto;
        border-radius: 20px;
        background: white;
        box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        animation: fadeIn 0.6s ease-in-out;
    }

    .edit-header {
        background: linear-gradient(135deg, #6a5cff, #8f94fb);
        color: white;
        padding: 25px;
        border-radius: 20px 20px 0 0;
        text-align: center;
    }

    .form-control {
        border-radius: 10px;
        padding: 10px;
        border: 1px solid #ddd;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: #6f42c1;
        box-shadow: 0 0 0 0.2rem rgba(111, 66, 193, 0.2);
    }

    .btn-save {
        background: linear-gradient(135deg, #6f42c1, #8f94fb);
        color: white;
        border-radius: 10px;
        padding: 12px;
        font-weight: 500;
        transition: 0.3s;
    }

    .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(111, 66, 193, 0.3);
    }

    .btn-cancel {
        border-radius: 10px;
    }

    .form-label {
        font-weight: 500;
        margin-bottom: 5px;
        color: #555;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px);}
        to { opacity: 1; transform: translateY(0);}
    }
</style>

<div class="container mt-5">

    <div class="edit-card">

        <!-- HEADER -->
        <div class="edit-header">
            <h4><i class="bi bi-pencil-square"></i> Edit Profile</h4>
            <p class="mb-0" style="font-size:14px;">Update your personal details</p>
        </div>

        <!-- FORM -->
        <div class="p-4">

            <form method="POST">
                {% csrf_token %}

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    {{ form.email }}
                </div>

                <!-- First Name -->
                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    {{ form.first_name }}
                </div>

                <!-- Last Name -->
                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    {{ form.last_name }}
                </div>

                <!-- BUTTONS -->
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-save w-100">
                        💾 Save Changes
                    </button>

                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary btn-cancel w-100">
                        Cancel
                    </a>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
