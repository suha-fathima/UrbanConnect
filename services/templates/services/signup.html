{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - UrbanConnect</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background: url("{% static 'images/signup.avif' %}") no-repeat center center fixed;
        background-size: cover;
        font-family: 'Arial', sans-serif;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
    }

    .signup-card {
        width: 480px; /* wider card */
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        animation: fadeIn 0.7s ease-in-out;
        background: #ffffff; /* fully opaque */
        position: relative;
        z-index: 1;
    }

    .signup-header {
        background: linear-gradient(135deg, #d93a3a, #d3576a);
        color: white;
        text-align: center;
        padding: 25px 20px;
        font-weight: 600;
        font-size: 1.6rem;
    }

    .signup-body {
        padding: 25px 25px;
    }

    .signup-body .form-label {
        font-weight: 500;
    }

    .signup-body input.form-control {
        border-radius: 10px;
        padding: 10px;
    }

    .btn-primary {
        background: rgb(206, 83, 83);
        border: none;
        border-radius: 10px;
        font-weight: 500;
        padding: 10px;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        background: #59339d;
        transform: scale(1.03);
    }

    .text-center a {
        color: #6a5cff;
        text-decoration: none;
        font-weight: 500;
    }

    .text-center a:hover {
        text-decoration: underline;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px);}
        to { opacity: 1; transform: translateY(0);}
    }
</style>
</head>
<body>

<div class="signup-card">
    <div class="signup-header">
        Create Your Account
    </div>
    <div class="signup-body">
        <form method="POST" novalidate>
            {% csrf_token %}

            <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" class="form-control" name="username" id="id_username" placeholder="Enter your username" required>
            </div>

            <div class="mb-3">
                <label for="id_email" class="form-label">Email</label>
                <input type="email" class="form-control" name="email" id="id_email" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label for="id_password1" class="form-label">Password</label>
                <input type="password" class="form-control" name="password1" id="id_password1" placeholder="Enter password" required>
            </div>

            <div class="mb-3">
                <label for="id_password2" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" name="password2" id="id_password2" placeholder="Confirm password" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Sign Up</button>
            </div>
        </form>

        <p class="text-center mt-3">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
