{% extends 'services/base.html' %}
{% load static %}

{% block content %}

<style>
.form-container {
    max-width: 600px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 20px;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.form-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-container input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.submit-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 25px;
    color: white;
    font-weight: bold;
    background: linear-gradient(90deg, #6a5cff, #a855f7);
    transition: 0.3s;
}

.submit-btn:hover {
    transform: scale(1.05);
}
</style>

<div class="form-container">
    <h2>Join as a Professional</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{ form.as_p }}

        <button type="submit" class="submit-btn">
            Register Now
        </button>
    </form>
</div>

{% endblock %}
